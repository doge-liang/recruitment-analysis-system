<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岗位查询 - 招聘信息分析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; }
        .header .user-info a { color: white; text-decoration: none; margin-left: 20px; }
        .container { display: flex; min-height: calc(100vh - 60px); }
        .sidebar { width: 200px; background: white; padding: 20px 0; }
        .sidebar ul { list-style: none; }
        .sidebar li a { display: block; padding: 12px 20px; color: #333; text-decoration: none; }
        .sidebar li a:hover, .sidebar li a.active { background: #f0f0f0; color: #667eea; }
        .main-content { flex: 1; padding: 20px; }
        .search-box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .search-box input, .search-box select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-right: 10px; }
        .search-box button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .job-list { background: white; padding: 20px; border-radius: 10px; }
        .job-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .job-item:hover { background: #f9f9f9; }
        .job-info h3 { color: #333; font-size: 16px; margin-bottom: 5px; }
        .job-info p { color: #666; font-size: 14px; }
        .job-meta { text-align: right; }
        .job-meta .salary { color: #e74c3c; font-size: 16px; font-weight: bold; }
        .job-meta .company { color: #666; font-size: 14px; margin-top: 5px; }
        a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>大数据人才招聘分析系统</h1>
        <div class="user-info">
            <a href="/myApp/logout/">退出</a>
        </div>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <ul>
                <li><a href="/myApp/index/">系统首页</a></li>
                <li><a href="/myApp/salary/">薪资分析</a></li>
                <li><a href="/myApp/company/">企业分析</a></li>
                <li><a href="/myApp/educational/">学历分布</a></li>
                <li><a href="/myApp/address/">城市分布</a></li>
                <li><a href="/myApp/joblist/" class="active">岗位查询</a></li>
                <li><a href="/myApp/ml/salary_predict/">薪资预测</a></li>
                <li><a href="/myApp/ml/job_recommend/">岗位推荐</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="搜索职位名称...">
                <select id="address">
                    <option value="">城市（全部）</option>
                </select>
                <select id="educational">
                    <option value="">学历（全部）</option>
                </select>
                <button onclick="searchJobs()">搜索</button>
            </div>
            
            <div class="job-list" id="jobList">
                <div style="text-align:center;color:#999;padding:40px;">加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        function loadJobs() {
            fetch('/myApp/api/job/search/')
                .then(res => res.json())
                .then(data => {
                    renderJobs(data.jobs);
                });
        }
        
        function searchJobs() {
            var keyword = document.getElementById('keyword').value;
            var address = document.getElementById('address').value;
            var educational = document.getElementById('educational').value;
            
            fetch(`/myApp/api/job/search/?keyword=${keyword}&address=${address}&educational=${educational}`)
                .then(res => res.json())
                .then(data => {
                    renderJobs(data.jobs);
                });
        }
        
        function renderJobs(jobs) {
            var container = document.getElementById('jobList');
            if (jobs.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">暂无数据</div>';
                return;
            }
            
            container.innerHTML = jobs.map(job => `
                <div class="job-item">
                    <div class="job-info">
                        <h3><a href="/myApp/jobdetail/${job.id}/">${job.title}</a></h3>
                        <p>${job.address} | ${job.educational} | ${job.workExperience}</p>
                    </div>
                    <div class="job-meta">
                        <div class="salary">${job.salary}</div>
                        <div class="company">${job.companyTitle}</div>
                    </div>
                </div>
            `).join('');
        }
        
        loadJobs();
    </script>
</body>
</html>
